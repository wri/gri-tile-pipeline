pipeline:
  parquet_path: data/tiledb.parquet

# Lithops configs resolve via LITHOPS_ENV -> .lithops/<env>/config.*.yaml.
# Add a top-level `lithops:` section with per-key paths only if you need a
# one-off pin to a specific file.

download:
  runtime: ttc-loaders-dev
  memory_mb: 4096
  retries: 3

predict:
  runtime: ttc-predict-dev
  memory_mb: 6144
  retries: 2
  timeout_sec: 600

zonal:
  tile_bucket: wri-restoration-geodata-ttc
  small_sites_area_thresh: 0.5
