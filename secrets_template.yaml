# GRI Tile Pipeline — Secrets Template
#
# Copy this file to `secrets.yaml` (same directory as config.yaml) and fill in.
# `secrets.yaml` is gitignored — never commit it.
#
# Every field below is optional and can also be provided via environment
# variables or CLI flags. See docs/configuration.md for precedence rules.

# =============================================================================
# TERRAMATCH  (required only if you plan to use `gri-ttc tm-patch`)
# =============================================================================

terramatch:
  # Bearer token for the TerraMatch research API.
  # Override at runtime with GRI_TM_TOKEN env var or --token flag.
  token: ""

  # Override the default base URLs if you are pointing at a non-default
  # environment (e.g., a dev instance). Leaving these blank uses:
  #   staging    -> https://api-staging.terramatch.org/research/v3
  #   production -> https://api.terramatch.org/research/v3
  # staging_url:    ""
  # production_url: ""
